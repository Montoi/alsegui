server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── SPA Fallback ─────────────────────────────────────────
    # Todas las rutas del cliente se sirven con index.html
    # para que React Router (navegación por estado) funcione.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy inverso hacia el backend ────────────────────────
    # Las llamadas a /api/* se reenvían al contenedor del backend.
    location /api/ {
        proxy_pass         http://rental-api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Cabeceras de seguridad básicas ────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ── Caché para assets estáticos ───────────────────────────
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
